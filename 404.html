<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Not found · Ollama</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg" />
  <link rel="stylesheet" href="styles.css" />
  <script>(() => { const t = localStorage.getItem("theme"); if (t) document.documentElement.dataset.theme = t; })();</script>
</head>
<body data-page="404">
  <div data-shell="topbar"></div>

  <main class="notfound">
    <svg class="nf-mark" viewBox="0 0 100 100" aria-hidden="true"><use href="logo.svg#root"/></svg>
    <h1>404</h1>
    <p class="muted">This llama wandered off. Let's get you back.</p>
    <div style="display:flex; gap:12px; margin-top:8px;">
      <a class="btn" href="index.html">Home</a>
      <a class="btn btn-secondary" href="library.html">Browse models</a>
    </div>
  </main>

  <div data-shell="footer"></div>
  <div data-shell="palette"></div>
  <script src="app.js" defer></script>
</body>
</html>
